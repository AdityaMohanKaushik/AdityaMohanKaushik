<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jyotish Chart Calculator</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; max-width: 1100px; }
      h1, h2 { margin: 0 0 12px; }
      form { display: grid; gap: 8px; grid-template-columns: repeat(3, minmax(180px, 1fr)); margin-bottom: 16px; }
      label { display: grid; gap: 4px; font-size: 14px; }
      input { padding: 8px; border: 1px solid #d0d0d0; border-radius: 4px; }
      button { width: 180px; padding: 10px; border: 0; border-radius: 4px; background: #1d4ed8; color: #fff; font-weight: 600; cursor: pointer; }
      table { border-collapse: collapse; width: 100%; margin-bottom: 24px; }
      th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
      th { background: #f3f3f3; }
      #status { margin: 8px 0 16px; font-weight: 700; }
      .charts { display: grid; grid-template-columns: repeat(3, minmax(240px, 1fr)); gap: 14px; }
      .card { border: 1px solid #ddd; border-radius: 6px; padding: 10px; }
      .muted { color: #555; font-size: 14px; }
      @media (max-width: 900px) { form, .charts { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <h1>Vedic Jyotish Calculator</h1>
    <p class="muted">Enter birth details and generate Graha data, Viṁśottarī Daśā, and divisional charts.</p>

    <form id="calculator-form">
      <label>Location
        <input id="location" value="Dehradun, Uttarakhand" required />
      </label>
      <label>Date
        <input id="date" type="date" value="2026-03-11" required />
      </label>
      <label>Time (24h)
        <input id="time24" value="09:06:00" pattern="^\d{2}:\d{2}(:\d{2})?$" required />
      </label>
      <label>Latitude
        <input id="latitude" type="number" step="0.0001" value="30.3165" required />
      </label>
      <label>Longitude
        <input id="longitude" type="number" step="0.0001" value="78.0322" required />
      </label>
      <label>Timezone (IANA or ±HH:MM)
        <input id="timezone" value="Asia/Kolkata" required />
      </label>
    </form>

    <button id="autofill" type="button">Auto-fill location details</button>
    <button id="calculate" type="button">Calculate Chart</button>
    <p id="status" aria-live="polite"></p>

    <h2>Graha Info</h2>
    <table>
      <thead>
        <tr>
          <th>Body</th><th>Name</th><th>Kāraka</th><th>Long</th><th>Lat</th><th>Nakṣatra</th><th>Pada</th>
        </tr>
      </thead>
      <tbody id="graha"></tbody>
    </table>

    <h2>Viṁśottarī Daśā</h2>
    <table>
      <thead><tr><th>Lord</th><th>Years from birth</th><th>Range</th></tr></thead>
      <tbody id="dasha"></tbody>
    </table>

    <h2>Divisional Charts</h2>
    <div class="charts">
      <div class="card">
        <h3>D1 (Rāśi)</h3>
        <p id="d1-asc" class="muted"></p>
        <table><thead><tr><th>Planet</th><th>Sign</th></tr></thead><tbody id="d1-planets"></tbody></table>
      </div>
      <div class="card">
        <h3>D9 (Navāṁśa)</h3>
        <table><thead><tr><th>Planet</th><th>Sign</th></tr></thead><tbody id="d9-planets"></tbody></table>
      </div>
      <div class="card">
        <h3>D60 (Ṣaṣṭiāṁśa)</h3>
        <table><thead><tr><th>Planet</th><th>Sign</th></tr></thead><tbody id="d60-planets"></tbody></table>
      </div>
    </div>

    <script>
      function clearTable(id) {
        document.getElementById(id).innerHTML = '';
      }

      function fillTable(id, rows, renderer) {
        clearTable(id);
        const body = document.getElementById(id);
        rows.forEach((row) => {
          const tr = document.createElement('tr');
          tr.innerHTML = renderer(row);
          body.appendChild(tr);
        });
      }

      async function calculate() {
        const payload = {
          location: document.getElementById('location').value,
          date: document.getElementById('date').value,
          time24: document.getElementById('time24').value,
          latitude: Number(document.getElementById('latitude').value),
          longitude: Number(document.getElementById('longitude').value),
          timezone: document.getElementById('timezone').value
        };

        const status = document.getElementById('status');
        status.textContent = 'Calculating...';

        const response = await fetch('/api/calculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (!response.ok) {
          status.textContent = `Error: ${result.error || 'Unable to calculate chart'}`;
          return;
        }

        status.textContent = `Calculated for ${result.input.location} | Ayanāṁśa: ${result.ayanamsa}°`;

        fillTable('graha', result.grahaInfo, (row) => `<td>${row.body}</td><td>${row.name}</td><td>${row.karaka}</td><td>${row.long}</td><td>${row.lat}</td><td>${row.nakshatra}</td><td>${row.pada}</td>`);
        fillTable('dasha', result.vimshottariDasha.periods, (period) => `<td>${period.lord}</td><td>${period.yearsFromBirth}</td><td>${period.range}</td>`);

        document.getElementById('d1-asc').textContent = `Ascendant Sign: ${result.divisionalCharts.D1.ascendant}`;
        fillTable('d1-planets', result.divisionalCharts.D1.planets, (p) => `<td>${p.body}</td><td>${p.sign}</td>`);
        fillTable('d9-planets', result.divisionalCharts.D9.planets, (p) => `<td>${p.body}</td><td>${p.sign}</td>`);
        fillTable('d60-planets', result.divisionalCharts.D60.planets, (p) => `<td>${p.body}</td><td>${p.sign}</td>`);
      }

      async function autofillLocation() {
        const location = document.getElementById('location').value.trim();
        const status = document.getElementById('status');
        if (!location) {
          status.textContent = 'Enter a location first.';
          return;
        }

        status.textContent = 'Resolving location...';
        const response = await fetch(`/api/location-lookup?query=${encodeURIComponent(location)}`);
        const result = await response.json();
        if (!response.ok) {
          status.textContent = `Error: ${result.error || 'Unable to resolve location'}`;
          return;
        }

        document.getElementById('location').value = result.location;
        document.getElementById('latitude').value = Number(result.latitude).toFixed(4);
        document.getElementById('longitude').value = Number(result.longitude).toFixed(4);
        document.getElementById('timezone').value = result.timezone;
        status.textContent = `Location resolved: ${result.location} (${result.timezone})`;
      }

      document.getElementById('autofill').addEventListener('click', autofillLocation);
      document.getElementById('location').addEventListener('change', autofillLocation);
      document.getElementById('calculate').addEventListener('click', calculate);
      autofillLocation().then(calculate);
    </script>
  </body>
</html>
